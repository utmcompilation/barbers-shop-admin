<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Painel do Barbeiro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #06070a;
            color: white;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .title {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #9ca3af;
            margin-bottom: 32px;
        }

        .date-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .date-btn {
            padding: 16px 12px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, .08);
            background: #0f1117;
            color: white;
            cursor: pointer;
            transition: .2s;
            font-weight: 600;
        }

        .date-btn.active {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border: none;
        }

        .admin-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .admin-item {
            padding: 24px;
            border-radius: 24px;
            background: #0f1117;
            border: 1px solid rgba(255, 255, 255, .06);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .admin-name {
            font-size: 28px;
            font-weight: 800;
        }

        .admin-service {
            font-size: 18px;
            color: #d4d4d8;
        }

        .admin-date {
            font-size: 15px;
            line-height: 1.5;
            color: #9ca3af;
        }

        .admin-phone {
            font-size: 17px;
            font-weight: 600;
        }

        .admin-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
            text-decoration: none;
            color: white;
        }

        .btn:disabled {
            opacity: .7;
            cursor: not-allowed;
        }

        .btn-whatsapp {
            background: #22c55e;
        }

        .btn-danger {
            background: #dc2626;
        }

        .btn-primary {
            background: #2563eb;
        }

        .status {
            margin-bottom: 20px;
            padding: 18px;
            border-radius: 18px;
            display: none;
            font-weight: 600;
        }

        .status.success {
            display: block;
            background: rgba(34, 197, 94, .12);
            border: 1px solid rgba(34, 197, 94, .2);
            color: #86efac;
        }

        .status.error {
            display: block;
            background: rgba(239, 68, 68, .12);
            border: 1px solid rgba(239, 68, 68, .2);
            color: #fca5a5;
        }

        .empty {
            padding: 30px;
            border-radius: 24px;
            background: #0f1117;
            border: 1px solid rgba(255, 255, 255, .06);
            text-align: center;
            color: #9ca3af;
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .time-slot {
            padding: 14px;
            border-radius: 16px;
            text-align: center;
            background: #181b22;
            border: 1px solid rgba(255, 255, 255, .06);
            cursor: pointer;
            transition: .2s;
            font-weight: 600;
        }

        .time-slot.selected {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border: none;
        }

        .time-slot.booked {
            opacity: .35;
            cursor: not-allowed;
            text-decoration: line-through;
        }
    </style>
</head>

<body>

    <div id="loginScreen" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100dvh;
background:#06070a;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
z-index:99999;
">

        <div style="
width:100%;
max-width:420px;
background:#0f1117;
border:1px solid rgba(255,255,255,.06);
border-radius:28px;
padding:28px;
">

            <div style="
font-size:32px;
font-weight:800;
margin-bottom:10px;
">
                Área do Barbeiro
            </div>

            <div style="
color:#9ca3af;
margin-bottom:24px;
">
                Digite a senha para continuar.
            </div>

            <input id="passwordInput" type="password" placeholder="Senha" style="
width:100%;
height:58px;
border:none;
outline:none;
border-radius:18px;
background:#181b22;
color:white;
padding:0 18px;
font-size:16px;
margin-bottom:16px;
">

            <button id="loginButton" class="btn btn-primary">
                Entrar
            </button>

        </div>

    </div>

    <div class="container">

        <div class="title">
            Painel do Barbeiro
        </div>

        <div class="subtitle">
            Visualize, cancele e gerencie horários.
        </div>

        <div class="date-list" id="dateList"></div>

        <div id="status" class="status"></div>

        <div class="admin-list" id="adminList">

            <div class="empty">
                Carregando agendamentos...
            </div>

        </div>

    </div>

    <script>

        const ADMIN_PASSWORD = "123456";

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYViXxZbzC1llDcssi1DiW4aZ_CJ_9TD6wxPpRhOcdTf9oKTO24L7QZCuGk-XplBlZ/exec";

        const adminList = document.getElementById("adminList");
        const statusDiv = document.getElementById("status");
        const dateList = document.getElementById("dateList");

        let bookedAppointments = [];
        let selectedDate = null;

        const hours = [
            "08:00",
            "08:30",
            "09:00",
            "09:30",
            "10:00",
            "10:30",
            "11:00",
            "11:30",
            "13:00",
            "13:30",
            "14:00",
            "14:30",
            "15:00",
            "15:30",
            "16:00",
            "16:30",
            "17:00",
            "17:30"
        ];

        function generateDates() {

            const today = new Date();

            let added = 0;
            let i = 0;

            while (added < 7) {

                const date = new Date();

                date.setDate(today.getDate() + i);

                i++;

                const day = date.getDay();

                if (day === 0) {
                    continue;
                }

                const formatted = date.toISOString().split("T")[0];

                const button = document.createElement("button");

                button.className = "date-btn";

                button.innerHTML = `
<div>${date.toLocaleDateString('pt-BR', { weekday: 'short' })}</div>
<div>${date.toLocaleDateString('pt-BR')}</div>
`;

                button.onclick = () => {

                    document
                        .querySelectorAll(".date-btn")
                        .forEach(btn => btn.classList.remove("active"));

                    button.classList.add("active");

                    selectedDate = formatted;

                    renderAdmin();

                };

                dateList.appendChild(button);

                if (added === 0) {
                    button.click();
                }

                added++;

            }

        }

        async function loadAppointments(clearStatus = true) {

            adminList.innerHTML = `
<div class="empty">
Carregando agendamentos...
</div>
`;

            try {

                const response = await fetch(SCRIPT_URL);

                const data = await response.json();

                bookedAppointments = data;

                renderAdmin();

                if (clearStatus) {
                    statusDiv.className = "status";
                }

            } catch (error) {

                adminList.innerHTML = `
<div class="empty">
Erro ao carregar agendamentos.
</div>
`;

                showStatus("Erro ao carregar agendamentos.", "error");

            }

        }

        function renderAdmin() {

            adminList.innerHTML = "";

            const filteredAppointments = bookedAppointments.filter(item =>
                item.date === selectedDate
            );

            if (filteredAppointments.length === 0) {

                adminList.innerHTML = `
<div class="empty">
Nenhum horário reservado neste dia.
</div>
`;

                return;

            }

            filteredAppointments.sort((a, b) =>
                a.time.localeCompare(b.time)
            );

            filteredAppointments.forEach(item => {

                const div = document.createElement("div");

                div.className = "admin-item";

                const formattedDate = formatDate(item.date);

                const phone = String(item.phone).replace(/\D/g, '');

                div.innerHTML = `

<div class="admin-name">
${item.name}
</div>

<div class="admin-service">
${item.service}
</div>

<div class="admin-date">
📅 ${formattedDate}<br>
⏰ ${item.time}
</div>

<div class="admin-phone">
📞 ${item.phone}
</div>

<div class="admin-buttons">

<a
class="btn btn-whatsapp"
target="_blank"
href="https://wa.me/55${phone}">
Chamar no WhatsApp
</a>

<button
class="btn btn-primary"
onclick="rescheduleAppointment('${item.date}','${item.time}')">
Reagendar horário
</button>

<button
class="btn btn-danger"
onclick="cancelAppointment('${item.date}','${item.time}', this)">
Cancelar horário
</button>

</div>
`;

                adminList.appendChild(div);

            });

        }

        function formatDate(dateString) {

            const [year, month, day] = dateString.split("-");

            return `${day}/${month}/${year}`;

        }

        async function cancelAppointment(date, time, button) {

            button.disabled = true;

            button.innerText = "CANCELANDO...";

            try {

                await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "cancel",
                        date,
                        time
                    })
                });

                showStatus("Horário cancelado com sucesso.", "success");

                await loadAppointments(false);

            } catch (error) {

                button.disabled = false;

                button.innerText = "Cancelar horário";

                showStatus("Erro ao cancelar horário.", "error");

            }

        }

        async function rescheduleAppointment(oldDate, oldTime) {

            const overlay = document.createElement("div");

            overlay.style.cssText = `
position:fixed;
top:0;
left:0;
width:100%;
height:100dvh;
background:rgba(0,0,0,.82);
backdrop-filter:blur(8px);
display:flex;
align-items:flex-start;
justify-content:center;
padding:20px;
overflow-y:auto;
z-index:9999;
`;

            overlay.innerHTML = `

<div style="
width:100%;
max-width:650px;
background:#0f1117;
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:28px;
margin:auto 0;
max-height:90dvh;
overflow-y:auto;
">

<div style="
font-size:30px;
font-weight:800;
margin-bottom:10px;
">
Reagendar horário
</div>

<div style="
color:#9ca3af;
margin-bottom:28px;
">
Escolha uma nova data e horário.
</div>

<div id="modalDates" class="date-list"></div>

<div id="modalTimes" class="time-grid"></div>

<button
id="confirmBtn"
class="btn btn-primary"
disabled>
Confirmar reagendamento
</button>

<button
class="btn"
style="
background:#27272a;
margin-top:12px;
"
onclick="this.closest('div').parentElement.remove()">
Fechar
</button>

</div>
`;

            document.body.appendChild(overlay);

            const modalDates = overlay.querySelector("#modalDates");
            const modalTimes = overlay.querySelector("#modalTimes");
            const confirmBtn = overlay.querySelector("#confirmBtn");

            let selectedNewDate = null;
            let selectedNewTime = null;

            const today = new Date();

            let added = 0;
            let i = 0;

            while (added < 7) {

                const date = new Date();

                date.setDate(today.getDate() + i);

                i++;

                const day = date.getDay();

                if (day === 0) {
                    continue;
                }

                const formatted = date.toISOString().split("T")[0];

                const button = document.createElement("button");

                button.className = "date-btn";

                button.innerHTML = `
<div>${date.toLocaleDateString('pt-BR', { weekday: 'short' })}</div>
<div>${date.toLocaleDateString('pt-BR')}</div>
`;

                button.onclick = () => {

                    modalDates
                        .querySelectorAll(".date-btn")
                        .forEach(btn => btn.classList.remove("active"));

                    button.classList.add("active");

                    selectedNewDate = formatted;

                    renderAvailableTimes();

                };

                modalDates.appendChild(button);

                if (added === 0) {
                    button.click();
                }

                added++;

            }

            function renderAvailableTimes() {

                modalTimes.innerHTML = "";

                selectedNewTime = null;

                confirmBtn.disabled = true;

                let availableHours = [...hours];

                const [year, month, day] = selectedNewDate.split("-");

                const selectedDay = new Date(
                    year,
                    month - 1,
                    day
                ).getDay();

                if (selectedDay === 6) {

                    availableHours = hours.filter(hour => hour <= "11:30");

                }

                availableHours.forEach(hour => {

                    const slot = document.createElement("button");

                    slot.type = "button";

                    slot.className = "time-slot";

                    slot.innerText = hour;

                    const occupied = bookedAppointments.find(item =>
                        item.date === selectedNewDate &&
                        item.time === hour
                    );

                    if (occupied) {

                        slot.classList.add("booked");

                        slot.disabled = true;

                    }

                    slot.onclick = () => {

                        modalTimes
                            .querySelectorAll(".time-slot")
                            .forEach(el => el.classList.remove("selected"));

                        slot.classList.add("selected");

                        selectedNewTime = hour;

                        confirmBtn.disabled = false;

                    };

                    modalTimes.appendChild(slot);

                });

            }

            confirmBtn.onclick = async () => {

                if (!selectedNewDate || !selectedNewTime) {
                    return;
                }

                confirmBtn.disabled = true;

                confirmBtn.innerText = "REAGENDANDO...";

                try {

                    const response = await fetch(SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            action: "update",
                            oldDate,
                            oldTime,
                            newDate: selectedNewDate,
                            newTime: selectedNewTime
                        })
                    });

                    const result = await response.json();

                    if (!result.success) {

                        showStatus(
                            result.message || "Erro ao reagendar.",
                            "error"
                        );

                        confirmBtn.disabled = false;

                        confirmBtn.innerText = "Confirmar reagendamento";

                        return;

                    }

                    overlay.remove();

                    showStatus(
                        "Horário reagendado com sucesso.",
                        "success"
                    );

                    await loadAppointments(false);

                } catch (error) {

                    showStatus("Erro ao reagendar.", "error");

                    confirmBtn.disabled = false;

                    confirmBtn.innerText = "Confirmar reagendamento";

                }

            };

        }

        function showStatus(message, type) {

            statusDiv.style.display = "block";

            statusDiv.className = `status ${type}`;

            statusDiv.innerText = message;

        }

        window.onload = () => {

            const loginScreen =
                document.getElementById("loginScreen");

            const loginButton =
                document.getElementById("loginButton");

            const passwordInput =
                document.getElementById("passwordInput");

            function enterPanel() {

                loginScreen.style.display = "none";

                generateDates();

                loadAppointments();

            }

            const savedPassword =
                localStorage.getItem("barberAuth");

            if (savedPassword === ADMIN_PASSWORD) {

                enterPanel();

            }

            loginButton.onclick = () => {

                const password = passwordInput.value;

                if (password !== ADMIN_PASSWORD) {

                    alert("Senha incorreta");

                    return;

                }

                localStorage.setItem(
                    "barberAuth",
                    ADMIN_PASSWORD
                );

                enterPanel();

            };

            passwordInput.addEventListener(
                "keypress",
                (e) => {

                    if (e.key === "Enter") {

                        loginButton.click();

                    }

                }
            );

        };

    </script>

</body>

</html>
